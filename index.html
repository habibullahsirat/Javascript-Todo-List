<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Beginner To-Do App</title>

    <style>
      /* =========================
       BODY STYLING
    ========================== */

      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;
        margin: 0;
      }

      /* =========================
       MAIN CONTAINER
    ========================== */

      .todo-container {
        background-color: white;
        width: 450px;

        padding: 20px;

        border-radius: 10px;

        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
      }

      /* =========================
       INPUT SECTION
    ========================== */

      .input-section {
        display: flex;
        gap: 10px;
      }

      #taskInput {
        flex: 1;
        padding: 10px;
        font-size: 16px;
      }

      #addBtn {
        padding: 10px 15px;

        border: none;
        background-color: blue;
        color: white;

        cursor: pointer;

        border-radius: 5px;
      }

      #addBtn:hover {
        background-color: darkblue;
      }

      /* =========================
       TASK LIST
    ========================== */

      ul {
        list-style: none;
        padding: 0;

        margin-top: 20px;
      }

      li {
        background-color: #f9f9f9;

        margin-bottom: 10px;

        padding: 10px;

        border-radius: 5px;

        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* =========================
       TASK TEXT
    ========================== */

      .task-text {
        flex: 1;
      }

      /* Completed Task Style */

      .completed {
        text-decoration: line-through;
        color: gray;
      }

      /* =========================
       BUTTON CONTAINER
    ========================== */

      .button-group {
        display: flex;
        gap: 5px;
      }

      /* =========================
       COMPLETE BUTTON
    ========================== */

      .complete-btn {
        background-color: green;
        color: white;

        border: none;

        padding: 5px 10px;

        cursor: pointer;

        border-radius: 5px;
      }

      .complete-btn:hover {
        background-color: darkgreen;
      }

      /* =========================
       UPDATE BUTTON
    ========================== */

      .update-btn {
        background-color: orange;
        color: white;

        border: none;

        padding: 5px 10px;

        cursor: pointer;

        border-radius: 5px;
      }

      .update-btn:hover {
        background-color: darkorange;
      }

      /* =========================
       DELETE BUTTON
    ========================== */

      .delete-btn {
        background-color: red;
        color: white;

        border: none;

        padding: 5px 10px;

        cursor: pointer;

        border-radius: 5px;
      }

      .delete-btn:hover {
        background-color: darkred;
      }
    </style>
  </head>

  <body>
    <!-- =========================
       MAIN APP
  ========================== -->

    <div class="todo-container">
      <h1>To-Do List</h1>

      <!-- Input Section -->

      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task" />

        <button id="addBtn">Add</button>
      </div>

      <!-- Task List -->

      <ul id="taskList"></ul>
    </div>

    <script>
      /* =====================================================
       STEP 1: SELECT HTML ELEMENTS
    ====================================================== */

      const taskInput = document.getElementById("taskInput");

      const addBtn = document.getElementById("addBtn");

      const taskList = document.getElementById("taskList");

      /* =====================================================
       STEP 2: ADD CLICK EVENT TO ADD BUTTON
    ====================================================== */

      addBtn.addEventListener("click", addTask);

      /* =====================================================
       STEP 3: CREATE addTask FUNCTION
    ====================================================== */

      function addTask() {
        /*
        Get text from input field
      */

        const taskText = taskInput.value;

        /* ==========================================
         CHECK EMPTY INPUT
      =========================================== */

        if (taskText.trim() === "") {
          alert("Please enter a task");

          return;
        }

        /* ==========================================
         CREATE LI ELEMENT
      =========================================== */

        const li = document.createElement("li");

        /* ==========================================
         CREATE TASK TEXT SPAN
      =========================================== */

        const span = document.createElement("span");

        span.innerText = taskText;

        /*
        Add class for styling
      */

        span.classList.add("task-text");

        /* ==========================================
         CREATE BUTTON GROUP
      =========================================== */

        const buttonGroup = document.createElement("div");

        buttonGroup.classList.add("button-group");

        /* ==========================================
         CREATE COMPLETE BUTTON
      =========================================== */

        const completeBtn = document.createElement("button");

        completeBtn.innerText = "Complete";

        completeBtn.classList.add("complete-btn");

        /*
        COMPLETE BUTTON LOGIC
      */

        completeBtn.addEventListener("click", function () {
          /*
          Toggle completed class
        */

          span.classList.toggle("completed");
        });

        /* ==========================================
         CREATE UPDATE BUTTON
      =========================================== */

        const updateBtn = document.createElement("button");

        updateBtn.innerText = "Update";

        updateBtn.classList.add("update-btn");

        /*
        UPDATE BUTTON LOGIC
      */

        updateBtn.addEventListener("click", function () {
          /*
          Ask user for updated text
        */

          const updatedTask = prompt("Update your task:", span.innerText);

          /*
          Check if user clicked cancel
        */

          if (updatedTask === null) {
            return;
          }

          /*
          Check empty input
        */

          if (updatedTask.trim() === "") {
            alert("Task cannot be empty");

            return;
          }

          /*
          Update task text
        */

          span.innerText = updatedTask;
        });

        /* ==========================================
         CREATE DELETE BUTTON
      =========================================== */

        const deleteBtn = document.createElement("button");

        deleteBtn.innerText = "Delete";

        deleteBtn.classList.add("delete-btn");

        /*
        DELETE BUTTON LOGIC
      */

        deleteBtn.addEventListener("click", function () {
          li.remove();
        });

        /* ==========================================
         ADD BUTTONS INSIDE BUTTON GROUP
      =========================================== */

        buttonGroup.appendChild(completeBtn);

        buttonGroup.appendChild(updateBtn);

        buttonGroup.appendChild(deleteBtn);

        /* ==========================================
         ADD ELEMENTS INSIDE LI
      =========================================== */

        li.appendChild(span);

        li.appendChild(buttonGroup);

        /* ==========================================
         ADD LI TO TASK LIST
      =========================================== */

        taskList.appendChild(li);

        /* ==========================================
         CLEAR INPUT FIELD
      =========================================== */

        taskInput.value = "";
      }
    </script>
  </body>
</html>
